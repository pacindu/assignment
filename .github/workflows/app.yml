# =============================================================================
# App CI/CD — NTT GCC Sample API
#
# Triggers on changes to app/ or this workflow file.
#
# Jobs:
#   test            — pytest unit tests (all branches)
#   build-scan-push — build linux/arm64 image, Trivy scan, push to ECR (main only)
#   deploy          — rolling ECS deploy (main only)
#
# Deployment strategy: ECS rolling update (deployment_circuit_breaker + auto-rollback
# configured in Terraform; AWS rolls back automatically on failed health checks).
#
# Required GitHub secrets:
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN with ECR push + ECS deploy permissions
#                          (assumed via GitHub OIDC, no long-lived keys needed)
# =============================================================================

name: App CI/CD

on:
  push:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app.yml"
  pull_request:
    branches: [main]
    paths:
      - "app/**"
      - ".github/workflows/app.yml"

env:
  AWS_REGION:      ap-southeast-1
  ECR_REGISTRY:    992382521824.dkr.ecr.ap-southeast-1.amazonaws.com
  ECR_REPOSITORY:  ntt-gcc-production-app
  ECS_CLUSTER:     Ntt-Gcc-Production-Cluster
  ECS_SERVICE:     Ntt-Gcc-Production-Service
  ECS_TASK_FAMILY: Ntt-Gcc-Production-Task
  CONTAINER_NAME:  app

jobs:
  # ---------------------------------------------------------------------------
  # 1. Unit tests
  # ---------------------------------------------------------------------------
  test:
    name: Unit Tests
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: app/requirements-dev.txt

      - name: Install dependencies
        run: pip install -r app/requirements-dev.txt

      - name: Run pytest
        run: pytest app/tests/ -v --tb=short --junitxml=test-results.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: test-results.xml

  # ---------------------------------------------------------------------------
  # 2. Build (linux/arm64), Trivy scan, push to ECR
  # ---------------------------------------------------------------------------
  build-scan-push:
    name: Build, Scan & Push
    needs: test
    runs-on: ubuntu-latest
    permissions:
      id-token: write        # OIDC token for AWS credential exchange
      contents: read
      security-events: write # SARIF upload to GitHub Security tab

    outputs:
      image: ${{ steps.meta.outputs.image }}

    steps:
      - uses: actions/checkout@v4

      # QEMU + Buildx required to cross-compile linux/arm64 on x86 runner
      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Login to Amazon ECR
        uses: aws-actions/amazon-ecr-login@v2

      - name: Set image URI
        id: meta
        run: |
          echo "image=${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Build image (linux/arm64)
        run: |
          docker buildx build \
            --platform linux/arm64 \
            --load \
            -t ${{ steps.meta.outputs.image }} \
            app/

      # Scan BEFORE pushing — block on CRITICAL or HIGH unfixed CVEs
      # Run Trivy directly on the runner (not via Docker action) so it shares
      # the same Docker daemon that built the image with --load.
      - name: Install Trivy
        run: curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh | sh -s -- -b /usr/local/bin

      - name: Trivy vulnerability scan
        id: trivy
        continue-on-error: true
        run: |
          trivy image \
            --format sarif \
            --output trivy-results.sarif \
            --exit-code 1 \
            --severity CRITICAL,HIGH \
            --ignore-unfixed \
            ${{ steps.meta.outputs.image }}

      - name: Upload Trivy SARIF report
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: trivy-results.sarif
          category:   trivy

      - name: Fail on critical/high vulnerabilities
        if: steps.trivy.outcome == 'failure'
        run: exit 1

      # Push only on main after scan passes
      - name: Push to ECR
        if: github.ref == 'refs/heads/main'
        run: |
          docker push ${{ steps.meta.outputs.image }}
          docker tag  ${{ steps.meta.outputs.image }} \
            ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest
          docker push ${{ env.ECR_REGISTRY }}/${{ env.ECR_REPOSITORY }}:latest

  # ---------------------------------------------------------------------------
  # 3. Deploy to ECS — rolling update
  # Note: approval gate via GitHub Environments requires Team/Enterprise plan.
  # ---------------------------------------------------------------------------
  deploy:
    name: Deploy to ECS
    needs: build-scan-push
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ env.AWS_REGION }}

      # Download the current task definition from ECS and update the image tag
      - name: Download current task definition
        run: |
          aws ecs describe-task-definition \
            --task-definition ${{ env.ECS_TASK_FAMILY }} \
            --query taskDefinition \
            > task-definition.json

      - name: Render new task definition with updated image
        id: task-def
        uses: aws-actions/amazon-ecs-render-task-definition@v1
        with:
          task-definition:  task-definition.json
          container-name:   ${{ env.CONTAINER_NAME }}
          image:            ${{ needs.build-scan-push.outputs.image }}

      # Registers new task def revision + updates service (rolling update)
      # Circuit breaker is configured in Terraform — AWS auto-rolls back on failure
      - name: Deploy to ECS (rolling)
        uses: aws-actions/amazon-ecs-deploy-task-definition@v2
        with:
          task-definition:          ${{ steps.task-def.outputs.task-definition }}
          service:                  ${{ env.ECS_SERVICE }}
          cluster:                  ${{ env.ECS_CLUSTER }}
          wait-for-service-stability: true

      - name: Verify deployment rollout
        run: |
          STATE=$(aws ecs describe-services \
            --cluster ${{ env.ECS_CLUSTER }} \
            --services ${{ env.ECS_SERVICE }} \
            --query 'services[0].deployments[0].rolloutState' \
            --output text)
          echo "Rollout state: $STATE"
          [ "$STATE" = "COMPLETED" ] || exit 1
