# =============================================================================
# Infrastructure CI/CD — Terraform
#
# Triggers on changes to infra/ or this workflow file.
#
# Jobs (parallel where possible):
#   validate  — terraform fmt, validate, tflint
#   checkov   — Checkov IaC security scan (policy gate)
#   plan      — terraform plan posted as PR comment (PR only)
#   apply     — terraform apply (main push only)
#
# Required GitHub secrets:
#   AWS_DEPLOY_ROLE_ARN  — IAM role ARN assumed via OIDC (no static keys)
# =============================================================================

name: Infrastructure CI/CD

on:
  push:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"
  pull_request:
    branches: [main]
    paths:
      - "infra/**"
      - ".github/workflows/infra.yml"

env:
  AWS_REGION:      ap-southeast-1
  TF_VERSION:      1.14.0
  TF_WORKSPACE:    Production
  TF_VAR_FILE:     workspaces/Production.tfvars
  TF_WORKING_DIR:  infra/resources

jobs:
  # ---------------------------------------------------------------------------
  # 1. Format check + validate + tflint
  # ---------------------------------------------------------------------------
  validate:
    name: Validate & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform fmt check
        run: terraform fmt -check -recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: terraform init (local backend — no AWS needed)
        run: terraform init -backend=false
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: terraform validate
        run: terraform validate
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Setup tflint
        uses: terraform-linters/setup-tflint@v4
        with:
          tflint_version: latest

      - name: tflint
        run: tflint --recursive
        working-directory: ${{ env.TF_WORKING_DIR }}

  # ---------------------------------------------------------------------------
  # 2. Checkov security / compliance scan (policy gate)
  #    Checks: missing tags, public S3, admin SGs, wildcard IAM, logging enabled
  # ---------------------------------------------------------------------------
  checkov:
    name: Checkov Policy Gate
    runs-on: ubuntu-latest
    permissions:
      actions:         read   # required by upload-sarif in private repos
      contents:        read
      security-events: write

    steps:
      - uses: actions/checkout@v4

      # Run Checkov directly on the runner (not via Docker action) so the
      # SARIF output file is written to the runner filesystem, not a container.
      - name: Install Checkov
        run: pip install checkov

      # Step 1: CLI output in logs — exit code drives the gate
      - name: Run Checkov
        id: checkov
        continue-on-error: true
        run: |
          checkov \
            --directory infra/ \
            --framework terraform \
            --output cli

      # Step 2: SARIF written to file — soft-fail so the exit code of this
      # step does not affect the gate above.
      # Write raw output to a temp file first (avoids pipe-buffer truncation),
      # then use a Python one-liner to strip the ASCII banner and extract
      # the JSON portion starting at the first '{'.
      - name: Generate Checkov SARIF
        if: always()
        env:
          SARIF_PATH: ${{ github.workspace }}/checkov-results.sarif
        run: |
          checkov \
            --directory infra/ \
            --framework terraform \
            --output sarif \
            --soft-fail \
            > /tmp/checkov-raw.txt 2>/dev/null || true
          python3 -c "import os; d=open('/tmp/checkov-raw.txt').read(); i=d.find('{'); open(os.environ['SARIF_PATH'],'w').write(d[i:] if i>=0 else '{}')"

      - name: Upload Checkov SARIF report
        uses: github/codeql-action/upload-sarif@v4
        if: always()
        with:
          sarif_file: ${{ github.workspace }}/checkov-results.sarif
          category:   checkov

      - name: Fail on policy violations
        if: steps.checkov.outcome == 'failure'
        run: exit 1

  # ---------------------------------------------------------------------------
  # 3. Terraform plan — runs on PR only, posts plan as PR comment
  # ---------------------------------------------------------------------------
  plan:
    name: Terraform Plan
    needs: [validate, checkov]
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      id-token:      write
      contents:      read
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: terraform workspace select
        run: terraform workspace select ${{ env.TF_WORKSPACE }}
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: terraform plan
        id: plan
        run: |
          terraform plan \
            -var-file=${{ env.TF_VAR_FILE }} \
            -out=tfplan.binary \
            -no-color \
            2>&1 | tee plan.txt
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload plan artefacts
        uses: actions/upload-artifact@v4
        with:
          name:           terraform-plan-pr${{ github.event.pull_request.number }}
          path: |
            ${{ env.TF_WORKING_DIR }}/tfplan.binary
            ${{ env.TF_WORKING_DIR }}/plan.txt
          retention-days: 7

      - name: Post plan as PR comment
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs   = require('fs')
            const raw  = fs.readFileSync('${{ env.TF_WORKING_DIR }}/plan.txt', 'utf8')
            const max  = 65000
            const body = raw.length > max
              ? `## Terraform Plan\n\`\`\`\n${raw.slice(0, max)}\n...(truncated)\n\`\`\``
              : `## Terraform Plan\n\`\`\`\n${raw}\n\`\`\``
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner:        context.repo.owner,
              repo:         context.repo.repo,
              body
            })

  # ---------------------------------------------------------------------------
  # 4. Terraform apply — runs on push to main
  # Note: approval gate via GitHub Environments requires Team/Enterprise plan.
  # ---------------------------------------------------------------------------
  apply:
    name: Terraform Apply
    needs: [validate, checkov]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region:     ${{ env.AWS_REGION }}

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: terraform init
        run: terraform init
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: terraform workspace select
        run: terraform workspace select ${{ env.TF_WORKSPACE }}
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: terraform apply
        run: |
          terraform apply \
            -var-file=${{ env.TF_VAR_FILE }} \
            -auto-approve \
            -no-color \
            2>&1 | tee apply.txt
        working-directory: ${{ env.TF_WORKING_DIR }}

      - name: Upload apply output
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name:           terraform-apply-${{ github.run_id }}
          path:           ${{ env.TF_WORKING_DIR }}/apply.txt
          retention-days: 30
